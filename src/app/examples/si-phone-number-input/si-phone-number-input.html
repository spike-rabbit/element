<form class="p-5" [formGroup]="form">
  <div class="row">
    <div class="col-sm-6 col-lg-4">
      <si-form-item label="Phone number:">
        <si-phone-number-input
          class="form-control"
          formControlName="phoneNumber"
          placeholderForSearch="FORM.SEARCH"
          selectCountryAriaLabel="FORM.SELECT_COUNTRY"
          defaultCountry="CH"
          [supportedCountries]="['AU', 'CH', 'DE', 'FK', 'IN', 'US']"
          (valueChange)="lastEventValue = $event"
        />
      </si-form-item>
    </div>
  </div>
  <hr />
  <div>
    <span class="si-h5">Last emitted change event: </span>
    <pre>{{ lastEventValue | json }}</pre>
  </div>
  <div>
    <span class="si-h5">Current form value: </span>
    <pre>{{ form.controls.phoneNumber.value | json }}</pre>
  </div>
  <div>
    <span class="si-h5">Validation Error: </span>
    <pre>{{ form.controls.phoneNumber.errors | json }}</pre>
  </div>
</form>
