<div class="p-6">
  <h4 class="mb-4">Action cards (clickable)</h4>
  <div class="row">
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        heading="Energy report"
        (click)="onCardClick('energy-report')"
      >
        <si-icon headerIcon icon="element-report" class="icon me-3" />
        <p class="card-body card-text" body> View this week's energy consumption summary. </p>
      </button>
    </div>
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        class="accent-info"
        heading="System settings"
        (click)="onCardClick('system-settings')"
      >
        <si-icon headerIcon icon="element-settings" class="icon me-3" />
        <p class="card-body card-text" body> Configure thresholds, alarms and schedules. </p>
      </button>
    </div>
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        disabled
        heading="Export data"
        (click)="onCardClick('export-data')"
      >
        <si-icon headerIcon icon="element-export" class="icon me-3" />
        <p class="card-body card-text" body> Download the latest measurements as a CSV file. </p>
      </button>
    </div>
  </div>

  <h4 class="mt-6 mb-4">Action cards (toggle selection)</h4>
  <div class="row">
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        selectable
        heading="Meeting room A1.01"
        (selectedChange)="onCardSelect($event, 'room-a101')"
      >
        <si-icon headerIcon icon="element-room" class="icon me-3" />
        <p class="card-body card-text" body>Floor 1 &middot; 12 seats</p>
      </button>
    </div>
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        class="accent-info"
        selectable
        heading="Meeting room A1.02"
        (selectedChange)="onCardSelect($event, 'room-a102')"
      >
        <si-icon headerIcon icon="element-room" class="icon me-3" />
        <p class="card-body card-text" body>Floor 1 &middot; 8 seats</p>
      </button>
    </div>
    <div class="col-12 col-md-4 mb-6">
      <button
        si-action-card
        type="button"
        selectable
        disabled
        heading="Meeting room A1.03"
        (selectedChange)="onCardSelect($event, 'room-a103')"
      >
        <si-icon headerIcon icon="element-room" class="icon me-3" />
        <p class="card-body card-text" body>Floor 1 &middot; 6 seats</p>
      </button>
    </div>
  </div>
</div>
