- link "Jump to Main content"
- link "Jump to Navigation"
- banner:
  - link "Siemens logo":
    - /url: "#/"
  - heading "Siemens Dashboards" [level=1]
  - button "Toggle theme"
- navigation:
  - button "expand"
- main:
  - heading "Sample Dashboard" [level=2]
  - combobox "number":
    - option "All week" [selected]
    - option "Mon"
    - option "Tue"
    - option "Wed"
    - option "Thu"
    - option "Fri"
  - combobox "number":
    - option "All levels" [selected]
    - option "Success"
    - option "Warning"
    - option "Danger"
  - button "Edit"
  - list "Dashboard widgets":
    - listitem "Project Issues!":
      - img "Buildings at scale"
      - text: /Project Issues! \d+ Issues Number of contributing issues/
