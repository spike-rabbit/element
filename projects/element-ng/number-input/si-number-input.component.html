<input
  #inputElement
  type="number"
  class="focus-none"
  [attr.id]="inputId()"
  [step]="step()"
  [readonly]="readonly()"
  [disabled]="disabled()"
  [attr.aria-label]="ariaLabel() | translate"
  [attr.aria-describedby]="errormessageId()"
  [attr.placeholder]="placeholder() | translate"
  [attr.min]="min()"
  [attr.max]="max()"
  (blur)="onTouched()"
  (input)="modelChanged()"
/>
@if (unit()) {
  <span class="unit" [class.text-secondary]="!disabled()" [class.text-disabled]="disabled()">{{
    unit()
  }}</span>
}
@if (showButtons()) {
  <div class="form-control-actions">
    <button
      type="button"
      tabindex="-1"
      aria-hidden="true"
      class="dec btn btn-icon btn-tertiary btn-sm"
      [disabled]="disabled() || readonly() || !canDec"
      (mousedown)="autoUpdateStart($event, false)"
      (touchstart)="autoUpdateStart($event, false)"
      (touchend)="autoUpdateStop()"
      (mouseup)="autoUpdateStop()"
      (mouseleave)="autoUpdateStop()"
    >
      <si-icon [icon]="icons.elementMinus" />
    </button>
    <button
      type="button"
      tabindex="-1"
      aria-hidden="true"
      class="inc btn btn-icon btn-tertiary btn-sm"
      [disabled]="disabled() || readonly() || !canInc"
      (mousedown)="autoUpdateStart($event, true)"
      (touchstart)="autoUpdateStart($event, true)"
      (touchend)="autoUpdateStop()"
      (mouseup)="autoUpdateStop()"
      (mouseleave)="autoUpdateStop()"
    >
      <si-icon [icon]="icons.elementPlus" />
    </button>
  </div>
}
