<div class="has-navbar-fixed-top">
  <si-application-header>
    <si-header-brand>
      <a routerLink="home" siHeaderLogo></a>
      <h1 class="application-name">Navbar Vertical Next Example</h1>
    </si-header-brand>
  </si-application-header>

  <si-navbar-vertical-next
    stateId="navbar-vertical-next-routing"
    toggleButtonText="Toggle"
    [inlineCollapse]="inlineCollapse()"
  >
    <si-navbar-vertical-next-search placeholder="Search..." />
    <si-navbar-vertical-next-items>
      <a si-navbar-vertical-next-item routerLink="home" routerLinkActive icon="element-home">
        Home
      </a>
      <a
        si-navbar-vertical-next-item
        routerLink="coverage"
        routerLinkActive
        icon="element-diagnostic"
        badge="Text"
        badgeColor="danger-emphasis"
      >
        Test coverage
      </a>
      <si-navbar-vertical-next-header>Modules</si-navbar-vertical-next-header>
      <a si-navbar-vertical-next-item routerLink="menu-item" routerLinkActive icon="element-fire">
        Emergencies
      </a>
      <a si-navbar-vertical-next-item routerLink="energy" routerLinkActive icon="element-trend">
        Energy &amp; sustainability
      </a>
    </si-navbar-vertical-next-items>
    <si-navbar-vertical-next-footer-items>
      <a
        si-navbar-vertical-next-item
        routerLink="configuration"
        routerLinkActive
        icon="element-parameter"
      >
        Configuration
      </a>
    </si-navbar-vertical-next-footer-items>

    <div class="si-layout-main-padding">
      <si-breadcrumb-router />
      <div class="si-layout-header">
        <h2 class="si-layout-title si-layout-top-element">Example with angular routing</h2>
      </div>
      <router-outlet />
      <div class="card p-5 mt-8 e2e-ignore">
        <div class="card-header">Control panel</div>
        <div class="card-body">
          <div class="row">
            <div class="col-sm-auto">
              <si-form-item label="Inline collapse">
                <input type="checkbox" class="form-check-input" [(ngModel)]="inlineCollapse" />
              </si-form-item>
            </div>
          </div>
        </div>
      </div>
    </div>
  </si-navbar-vertical-next>
</div>
