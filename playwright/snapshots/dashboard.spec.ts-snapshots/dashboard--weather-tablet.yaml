        - /url: https://github.com/siemens/element/issues
    - listitem "Bar Chart":
      - text: ""
      - menubar:
        - menuitem "Print"
        - menuitem "Expand"
        - menuitem "Toggle"
    - listitem "Pie Chart":
      - text: ""
      - menubar:
        - menuitem "Expand"
    - listitem "Full Speed"
    - listitem "Line Chart":
      - text: ""
      - menubar:
        - menuitem "Print"
        - menuitem "Expand"
        - menuitem "Toggle"
