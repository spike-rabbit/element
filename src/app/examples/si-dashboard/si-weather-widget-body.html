<div class="row">
  <div class="col-lg-4 col-md-6 mb-6">
    <h5>Vertical body</h5>
    <si-weather-widget-body layout="vertical" [value]="data" />
  </div>
  <div class="col-lg-8 col-md-12 mb-6">
    <h5>Horizontal body</h5>
    <si-weather-widget-body layout="horizontal" [value]="data" />
  </div>
  <div class="col-lg-4 col-md-6 mb-6">
    <h5>Compact body</h5>
    <si-weather-widget-body layout="compact" location="Zug" [value]="data" />
  </div>
</div>
