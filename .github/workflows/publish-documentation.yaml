name: Publish Documentation
on:
  push:
    branches:
      - main

permissions: read-all

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yaml
    secrets:
      SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      SIEMENS_NPM_USER: ${{ secrets.SIEMENS_NPM_USER }}
      MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}

  publish-documentation:
    environment: github-pages
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    needs:
      - build-and-test
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pages
          path: dist/design
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: coverage-reports
      - run: |
          cp coverage-reports/coverage-summary.json dist/design/coverage-summary.json
          cp -r coverage-reports dist/design/coverage
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: 'dist/design'
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # Publishes the documentation built from main to the "development" path of the
  # versioned S3 bucket (https://element.siemens.io/development/) and refreshes
  # versions.json so the "Development" entry stays on top of the version selector.
  publish-development-documentation:
    runs-on: ubuntu-24.04
    needs:
      - build-and-test
    permissions:
      id-token: write
    env:
      VERSIONED_BUCKET_NAME: simpl-element-release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pages
          path: pages
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::974483672234:role/simpl-element-release
          role-session-name: element-development-docs
          aws-region: eu-west-1
      - run: >-
          tools/release/publish-development-docs.sh
          "${{ env.VERSIONED_BUCKET_NAME }}"
